<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline · Crecoard</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 24px; text-align: center;
      background: #0d0e11; color: #e7e7ea;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    img { width: 72px; height: 72px; border-radius: 18px; }
    h1 { font-size: 18px; margin: 0; font-weight: 600; }
    p { margin: 0; font-size: 14px; color: #9a9aa2; max-width: 22rem; line-height: 1.5; }
    button {
      margin-top: 8px; padding: 9px 18px; border: 1px solid #2a2b31; border-radius: 10px;
      background: #17181d; color: #e7e7ea; font-size: 14px; cursor: pointer;
    }
    button:hover { border-color: #fbc5ff; color: #fbc5ff; }
  </style>
</head>
<body>
  <img src="/icon-192.png" alt="Crecoard" />
  <h1>You're offline</h1>
  <p>Crecoard needs a connection to load your boards. Check your network and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
